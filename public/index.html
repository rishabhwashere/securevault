<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultX Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="brand-mark">VaultX</div>

  <section id="auth-view" class="auth-view">
    <div class="auth-shell">
      <section class="auth-stage">
        <div class="auth-heading">
          <p class="auth-copy">Sign in or create an account to access your secure vault.</p>
        </div>

        <div class="auth-switcher">
          <button id="show-login" class="nav-link is-active" type="button">Login</button>
          <button id="show-register" class="nav-link" type="button">Register</button>
        </div>

        <section id="feedback-banner" class="feedback-banner" hidden></section>

        <form id="login-form" class="form-card auth-form">
          <h3>Login</h3>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="alex@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Your password" required>
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="register-form" class="form-card auth-form" hidden>
          <h3>Register</h3>
          <label>
            <span>Name</span>
            <input type="text" name="name" placeholder="Alex Morgan" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="alex@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 8 characters" required>
          </label>
          <button type="submit">Register</button>
        </form>
      </section>
    </div>
  </section>

  <div id="app-view" class="app-view" hidden>
    <main class="content">
      <header class="topbar">
        <div></div>
        <button id="logout-button" class="ghost-button topbar-logout" type="button">Log out</button>
      </header>

      <section id="app-feedback-banner" class="feedback-banner" hidden></section>

      <section class="grid-layout">
        <div class="stack">
          <section class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Vault</p>
                <h3>Create a new secure entry</h3>
              </div>
              <button id="refresh-vault-button" class="secondary-button" type="button">Refresh vault</button>
            </div>

            <form id="vault-form" class="vault-form">
              <label>
                <span>Title</span>
                <input type="text" name="title" placeholder="Employee records" required>
              </label>
              <label>
                <span>Category</span>
                <input type="text" name="category" placeholder="documents">
              </label>
              <label class="full-width">
                <span>Stored data</span>
                <textarea name="data" rows="4" placeholder="What should be protected?" required></textarea>
              </label>
              <label>
                <span>Tags</span>
                <input type="text" name="tags" placeholder="finance, confidential">
              </label>
              <label>
                <span>Files</span>
                <input type="file" name="files" multiple accept=".jpg,.jpeg,.png,.pdf,.webp">
              </label>
              <div class="full-width form-actions">
                <button id="vault-submit-button" type="submit">Save vault entry</button>
                <button id="vault-reset-button" class="ghost-button" type="button">Reset</button>
              </div>
            </form>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Entries</p>
                <h3>Your secure documents</h3>
              </div>
            </div>

            <div id="vault-list" class="card-list empty-state">
              <p>Your vault entries will appear here after sign-in.</p>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <template id="vault-card-template">
    <article class="vault-card">
      <div class="vault-card-header">
        <div>
          <p class="vault-category"></p>
          <h4 class="vault-title"></h4>
        </div>
        <div class="vault-card-actions">
          <button class="ghost-button" type="button" data-action="share">Share</button>
          <button class="ghost-button" type="button" data-action="edit">Edit</button>
          <button class="ghost-button danger-button" type="button" data-action="delete">Delete</button>
        </div>
      </div>
      <p class="vault-data"></p>
      <div class="vault-meta"></div>
      <div class="vault-files"></div>
    </article>
  </template>

  <script type="module" src="/app.js"></script>
</body>
</html>
